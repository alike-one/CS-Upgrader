<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CS2 SKIN UPGRADE SIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-x-hidden">
    <canvas id="bg-canvas"></canvas>

    <div class="relative z-10 p-8">
        <h1 class="ascii-title text-center text-blue-500 font-bold mb-10">
            SKIN UPGRADE SIM
        </h1>

        <div class="glass-card p-6 rounded-xl border-glow">
            <h2 class="text-xl">Баланс: <span id="balance">100.00</span>$</h2>
            <button id="add-funds" class="glow-button mt-4 px-4 py-2 border">Пополнить</button>
        </div>
        
        <div id="skins-container" class="grid grid-cols-3 gap-6 mt-10"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass-card p-8 border-glow text-center">
            <h3 class="text-2xl mb-4">Google Pay Simulation</h3>
            <p>Успешно зачислено 1000$</p>
            <button onclick="closeModal()" class="mt-4 bg-blue-600 px-4 py-2">Закрыть</button>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
